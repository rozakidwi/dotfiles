[general]
import = [ "~/.config/alacritty/catppuccin.toml" ]

[window]
padding = { x = 20, y = 20 }

[env]
WINIT_WAYLAND_SCALE_FACTOR = "1"

[font]
normal = {
	family = "IosevkaTerm Nerd Font Mono",
	style = "Regular"
}
bold = {
	family = "IosevkaTerm Nerd Font Mono",
	style = "Bold"
}
italic = {
	family = "IosevkaTerm Nerd Font Mono",
	style = "Italic"
}
bold_italic = {
	family = "IosevkaTerm Nerd Font Mono",
	style = "BoldItalic"
}

size = 11
